<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marble Forge Prototype</title>
  <style>
    :root {
      --bg: #0f1220;
      --panel: rgba(16, 22, 40, 0.86);
      --accent: #57d1ff;
      --warn: #ff6b6b;
      --ok: #49d48c;
      --text: #eff3ff;
      --muted: #a9b4d0;
    }
    html, body { margin: 0; height: 100%; overflow: hidden; font-family: Inter, system-ui, sans-serif; background: var(--bg); color: var(--text); }
    #app { position: relative; width: 100%; height: 100%; }
    #game-canvas { width: 100%; height: 100%; display: block; }
    .panel {
      position: absolute; background: var(--panel); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px; backdrop-filter: blur(5px); padding: 12px;
    }
    #topbar { top: 12px; left: 12px; min-width: 280px; }
    #piece-panel { top: 12px; right: 12px; width: 320px; max-height: 74%; overflow: auto; }
    #actions { bottom: 12px; left: 12px; display: flex; gap: 10px; align-items: center; }
    #screen-overlay {
      position: absolute; inset: 0; background: rgba(8,10,18,0.82); display: flex; align-items: center;
      justify-content: center; z-index: 5;
    }
    .card { width: min(700px, 90vw); padding: 24px; border-radius: 14px; background: #161b31; border: 1px solid rgba(255,255,255,0.18); }
    .hidden { display: none !important; }
    h1, h2 { margin-top: 0; }
    .subtitle { color: var(--muted); }
    .row { display: flex; gap: 8px; flex-wrap: wrap; }
    button {
      border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; background: #20284a; color: var(--text);
      padding: 8px 10px; cursor: pointer; font-weight: 600;
    }
    button:hover { background: #2a3561; }
    button.primary { background: #2d5cff; border-color: #6f8dff; }
    button.primary:hover { background: #3d6aff; }
    button.warn { background: #6a2733; }
    .piece-btn { width: 100%; text-align: left; margin-bottom: 6px; display: grid; grid-template-columns: 1fr auto; }
    .piece-btn.active { outline: 2px solid var(--accent); }
    .tiny { font-size: 12px; color: var(--muted); }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="game-canvas"></canvas>

    <div id="topbar" class="panel">
      <div><strong id="phase-label">Title</strong></div>
      <div id="hud"></div>
      <div class="tiny">Controls: Left click place • Right click/Delete remove • R rotate • Space start run</div>
    </div>

    <div id="piece-panel" class="panel"></div>

    <div id="actions" class="panel">
      <button id="start-run" class="primary">Start Run (Space)</button>
      <button id="restart-run">Restart Attempt</button>
      <button id="next-level" class="hidden">Next Level</button>
      <span id="status-line" class="tiny"></span>
    </div>

    <div id="screen-overlay">
      <div class="card" id="title-card">
        <h1>Marble Forge</h1>
        <p class="subtitle">Build a track, release the metal ball, and optimize your score.</p>
        <button id="start-game" class="primary">Start Game</button>
      </div>
      <div class="card hidden" id="success-card">
        <h2>Level Complete!</h2>
        <div id="score-details"></div>
        <div class="row" style="margin-top: 12px;">
          <button id="next-level-overlay" class="primary">Next Level</button>
        </div>
      </div>
    </div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://esm.sh/three@0.164.1",
        "three/addons/": "https://esm.sh/three@0.164.1/examples/jsm/",
        "@dimforge/rapier3d-compat": "https://esm.sh/@dimforge/rapier3d-compat@0.12.0"
      }
    }
  </script>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
